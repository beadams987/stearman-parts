name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

permissions:
  contents: write

jobs:
  autofix:
    name: Auto-fix Lint Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install Node dependencies
        run: npm ci
        working-directory: web

      - name: Install Python lint tools
        run: pip install ruff

      - name: Auto-fix TypeScript unused imports
        working-directory: web
        run: npx eslint src/ --fix --rule '{"no-unused-vars":"off"}' || true

      - name: Auto-fix Python lint issues (ruff)
        run: ruff check --fix api/ || true

      - name: Commit fixes if any
        run: |
          git config user.name "ci-autofix[bot]"
          git config user.email "ci-autofix[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No auto-fix changes to commit"
          else
            git commit -m "ci: auto-fix lint issues

          Auto-removed unused imports and applied lint fixes."
            git push
          fi

  lint-api:
    name: Lint & Type Check API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install ruff mypy

      - name: Auto-fix with ruff (safety net)
        run: ruff check --fix api/ || true

      - name: Lint with ruff
        run: ruff check api/

      - name: Type check with mypy
        run: mypy api/app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  lint-web:
    name: Lint & Type Check Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Auto-fix unused imports (safety net)
        working-directory: web
        run: npx eslint src/ --fix --rule '{"no-unused-vars":"off"}' || true

      - name: Type check
        run: npx tsc --noEmit
        working-directory: web

      - name: Lint
        run: npx eslint src/
        working-directory: web
        continue-on-error: true

  build-web:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Auto-remove unused imports before build
        working-directory: web
        run: npx eslint src/ --fix --rule '{"no-unused-vars":"off"}' || true

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_API_URL: ${{ vars.API_URL || 'https://func-stearman-api.azurewebsites.net/api' }}
          VITE_WORKOS_CLIENT_ID: ${{ vars.WORKOS_CLIENT_ID }}
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ vars.VITE_APPINSIGHTS_CONNECTION_STRING }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist

  deploy-swa:
    name: Deploy Frontend to Static Web App
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist

      - name: Deploy to Azure Static Web Apps (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          command: |
            # Use the SWA CLI as a fallback since the action can't be retried directly
            npx @azure/static-web-apps-cli deploy web/dist \
              --deployment-token ${{ secrets.SWA_DEPLOYMENT_TOKEN }} \
              --env production \
              2>&1
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}

      - name: Deploy to Azure Static Web Apps (action fallback)
        if: failure()
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true

  deploy-api:
    name: Deploy API to Azure Functions
    runs-on: ubuntu-latest
    needs: lint-api
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into package dir
        run: |
          pip install -r api/requirements.txt \
            --target api/.python_packages/lib/site-packages

      - name: Deploy via blob upload + WEBSITE_RUN_FROM_PACKAGE
        run: |
          set -e
          cd api
          zip -rq /tmp/api-deploy.zip . \
            -x "__pycache__/*" \
            -x ".python_packages/lib/site-packages/*/__pycache__/*"

          # Upload zip to blob storage (function-releases container)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          BLOB_NAME="${TIMESTAMP}-${GITHUB_SHA:0:8}.zip"
          CONTAINER="function-releases"
          ACCOUNT="ststearmanimages"

          pip install -q azure-storage-blob 2>/dev/null
          python3 -c "
          import os, time
          from datetime import datetime, timedelta, timezone
          from azure.storage.blob import BlobServiceClient, generate_blob_sas, BlobSasPermissions
          acct = os.environ['ACCOUNT']
          key = os.environ['STORAGE_KEY']
          cont = os.environ['CONTAINER']
          blob_name = os.environ['BLOB_NAME']
          conn = f'DefaultEndpointsProtocol=https;EndpointSuffix=core.windows.net;AccountName={acct};AccountKey={key}'
          svc = BlobServiceClient.from_connection_string(conn)
          cc = svc.get_container_client(cont)
          try:
              cc.create_container()
          except Exception:
              pass
          blob = cc.get_blob_client(blob_name)
          for attempt in range(3):
              try:
                  with open('/tmp/api-deploy.zip', 'rb') as f:
                      blob.upload_blob(f, overwrite=True)
                  break
              except Exception as e:
                  if attempt < 2:
                      print(f'Blob upload attempt {attempt+1} failed: {e}, retrying...')
                      time.sleep(5 * (attempt + 1))
                  else:
                      raise
          sas = generate_blob_sas(account_name=acct, account_key=key, container_name=cont,
              blob_name=blob_name, permission=BlobSasPermissions(read=True),
              expiry=datetime.now(timezone.utc) + timedelta(days=3650))
          url = f'https://{acct}.blob.core.windows.net/{cont}/{blob_name}?{sas}'
          with open('/tmp/blob_url.txt', 'w') as f:
              f.write(url)
          print(f'Uploaded: {blob_name}')
          "

          BLOB_URL=$(cat /tmp/blob_url.txt)
          echo "Uploaded to blob: $BLOB_NAME"

          # Set DEPLOY_COMMIT so health endpoint reports the current version
          curl -s -X POST \
            "https://func-stearman-api.scm.azurewebsites.net/api/settings" \
            -u '${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PASS }}' \
            -H "Content-Type: application/json" \
            -d "{\"DEPLOY_COMMIT\":\"${GITHUB_SHA}\"}" || true

          # Update WEBSITE_RUN_FROM_PACKAGE via the app's deploy webhook
          # (uses managed identity to update ARM settings directly)
          DEPLOY_SUCCESS=false
          for DEPLOY_ATTEMPT in 1 2 3; do
            HTTP_CODE=$(curl -s -o /tmp/deploy_resp.json -w "%{http_code}" -X POST \
              "https://func-stearman-api.azurewebsites.net/api/_deploy/update-package" \
              -H "Content-Type: application/json" \
              -H "X-Deploy-Key: ${{ secrets.DEPLOY_KEY }}" \
              -d "{\"blob_url\":\"${BLOB_URL}\",\"commit\":\"${GITHUB_SHA}\"}" || echo "000")

            echo "Deploy webhook attempt $DEPLOY_ATTEMPT: HTTP $HTTP_CODE"
            cat /tmp/deploy_resp.json 2>/dev/null || true
            echo ""

            if [ "$HTTP_CODE" = "200" ]; then
              DEPLOY_SUCCESS=true
              break
            fi
            echo "Retrying deploy webhook in $((DEPLOY_ATTEMPT * 10))s..."
            sleep $((DEPLOY_ATTEMPT * 10))
          done

          if [ "$DEPLOY_SUCCESS" != "true" ]; then
            echo "Deploy webhook unavailable after retries, using Kudu settings fallback"
            curl -s -X POST \
              "https://func-stearman-api.scm.azurewebsites.net/api/settings" \
              -u '${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PASS }}' \
              -H "Content-Type: application/json" \
              -d "{\"WEBSITE_RUN_FROM_PACKAGE\":\"${BLOB_URL}\"}" || true
          fi

          echo "Deploy complete, verifying..."

          # Wait for app to restart with new package, then verify
          EXPECTED_COMMIT="${GITHUB_SHA:0:7}"
          for i in 1 2 3 4 5 6; do
            sleep 10
            HEALTH=$(curl -s "https://func-stearman-api.azurewebsites.net/api/health" 2>/dev/null || echo "{}")
            LIVE_COMMIT=$(echo "$HEALTH" | python3 -c "import json,sys; print(json.load(sys.stdin).get('commit','')[:7])" 2>/dev/null || echo "")
            echo "Attempt $i: commit=$LIVE_COMMIT (expected=$EXPECTED_COMMIT)"
            if [ "$LIVE_COMMIT" = "$EXPECTED_COMMIT" ]; then
              echo "✅ Deploy verified — API is running commit $LIVE_COMMIT"
              exit 0
            fi
          done

          echo "⚠️ Deploy uploaded but API hasn't picked up new code after 60s"
          echo "   This may require a manual ARM settings update"
          exit 1
        env:
          STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
          ACCOUNT: ststearmanimages
          CONTAINER: function-releases
          BLOB_NAME: ${{ github.sha }}.zip
          DEPLOY_COMMIT: ${{ github.sha }}

