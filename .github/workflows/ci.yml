name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  lint-api:
    name: Lint & Type Check API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check api/

      - name: Type check with mypy
        run: mypy api/app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  lint-web:
    name: Lint & Type Check Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: web

      - name: Lint
        run: npx eslint src/
        working-directory: web
        continue-on-error: true

  build-web:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_API_URL: ${{ vars.API_URL || 'https://func-stearman-api.azurewebsites.net/api' }}
          VITE_WORKOS_CLIENT_ID: ${{ vars.WORKOS_CLIENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  deploy-swa:
    name: Deploy Frontend to Static Web App
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: web/dist
          skip_app_build: true

  deploy-api:
    name: Deploy API to Azure Functions
    runs-on: ubuntu-latest
    needs: lint-api
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into package dir
        run: |
          pip install -r api/requirements.txt \
            --target api/.python_packages/lib/site-packages

      - name: Clear stale WEBSITE_RUN_FROM_PACKAGE
        run: |
          # functions-action@v1 sets this to a blob URL after deploy.
          # If present on the NEXT run, the action refuses to zip-deploy.
          # Use the publish profile credentials to clear it via Kudu API.
          PUBLISH_PROFILE='${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}'
          USER=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASS=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
          curl -sf -X DELETE \
            "https://func-stearman-api.scm.azurewebsites.net/api/settings" \
            -u "$USER:$PASS" \
            -H "Content-Type: application/json" \
            -d '{"WEBSITE_RUN_FROM_PACKAGE":""}' || true
          # Alternative: use the settings API to set it to "1" (local zip)
          curl -sf -X POST \
            "https://func-stearman-api.scm.azurewebsites.net/api/settings" \
            -u "$USER:$PASS" \
            -H "Content-Type: application/json" \
            -d '{"WEBSITE_RUN_FROM_PACKAGE":"1"}' || true

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-stearman-api
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false
